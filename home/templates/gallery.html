{% extends 'base.html' %}
{% load static %}

{% block title %}Gallery | OrbitShifts{% endblock %}

{% block content %}
<section class="gallery-section">
    <h1 style="font-size: 3rem; color: var(--primary-color); margin-bottom: 1rem;">Our Gallery</h1>
    <p style="opacity: 0.7; max-width: 600px; margin: 0 auto;">Take a look at our events, training sessions, and student achievements.</p>

    <div class="carousel-container">
        <div class="carousel-slide"><img src="{% static 'images/1.jpeg' %}" alt="Gallery Image 1"></div>
        <div class="carousel-slide"><img src="{% static 'images/2.jpeg' %}" alt="Gallery Image 2"></div>
        <div class="carousel-slide"><img src="{% static 'images/3.jpeg' %}" alt="Gallery Image 3"></div>
        <div class="carousel-slide"><img src="{% static 'images/4.jpeg' %}" alt="Gallery Image 4"></div>
        <div class="carousel-slide"><img src="{% static 'images/5.jpeg' %}" alt="Gallery Image 5"></div>
        <div class="carousel-slide"><img src="{% static 'images/6.jpeg' %}" alt="Gallery Image 6"></div>
        <div class="carousel-slide"><img src="{% static 'images/7.jpeg' %}" alt="Gallery Image 7"></div>
        <div class="carousel-slide"><img src="{% static 'images/8.jpeg' %}" alt="Gallery Image 8"></div>
        <div class="carousel-slide"><img src="{% static 'images/9.jpeg' %}" alt="Gallery Image 9"></div>
        <div class="carousel-slide"><img src="{% static 'images/10.jpeg' %}" alt="Gallery Image 10"></div>
        <div class="carousel-slide"><img src="{% static 'images/11.jpeg' %}" alt="Gallery Image 11"></div>
    </div>

    <div class="carousel-nav">
        <button class="nav-btn" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
        <button class="nav-btn" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    let current = 0;
    const slides = document.querySelectorAll(".carousel-slide");

    function updateSlides() {
        slides.forEach((slide, i) => {
            slide.classList.remove('active', 'prev', 'next');
            
            let diff = i - current;
            if (diff > slides.length / 2) diff -= slides.length;
            if (diff < -slides.length / 2) diff += slides.length;

            if (diff === 0) {
                slide.classList.add('active');
            } else if (diff === -1) {
                slide.classList.add('prev');
            } else if (diff === 1) {
                slide.classList.add('next');
            }
        });
    }

    document.getElementById("nextBtn").onclick = () => {
        current = (current + 1) % slides.length;
        updateSlides();
    };

    document.getElementById("prevBtn").onclick = () => {
        current = (current - 1 + slides.length) % slides.length;
        updateSlides();
    };

    updateSlides();
    
    // Auto play
    setInterval(() => {
        current = (current + 1) % slides.length;
        updateSlides();
    }, 5000);
</script>
{% endblock %}
